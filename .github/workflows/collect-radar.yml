name: Collect Radar GIFs

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min
  workflow_dispatch: # manual trigger for testing

concurrency:
  group: collect-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout wx-radar (collector code)
        uses: actions/checkout@v4

      - name: Checkout wx-radar-data
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Run collector
        env:
          DATA_DIR: ${{ github.workspace }}/data
          DATA_REPO: ${{ vars.DATA_REPO }}
          DATA_BRANCH: main
          WEATHER_COM_API_KEY: ${{ secrets.WEATHER_COM_API_KEY }}
        run: npm run collect:radar

      - name: Commit and push data
        working-directory: data
        run: |
          git config user.name "wx-radar-bot"
          git config user.email "wx-radar-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "radar: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
